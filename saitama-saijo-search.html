<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>埼玉県 公営斎場検索 - 葬儀社実務用</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1a2744;--navy-light:#2a3a5c;--navy-dark:#0f1a30;
  --gold:#b8964e;--gold-light:#d4b477;
  --gray:#f5f5f3;--gray-mid:#e0ddd8;--gray-dark:#6b6b6b;
  --white:#fff;--text:#2c2c2c;--text-light:#555;
  --red:#c0392b;--green:#27713b;
}
body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:var(--gray);color:var(--text);line-height:1.7;min-height:100vh}
header{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:var(--white);padding:28px 20px 24px;text-align:center;border-bottom:3px solid var(--gold)}
header h1{font-size:1.5rem;font-weight:700;letter-spacing:.08em;margin-bottom:6px}
header p{font-size:.85rem;color:var(--gold-light);letter-spacing:.05em}
.container{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.search-box{background:var(--white);border-radius:10px;padding:28px 24px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:20px}
.search-box label{display:block;font-weight:700;font-size:.95rem;margin-bottom:12px;color:var(--navy)}
.input-row{display:flex;gap:10px;align-items:stretch}
.input-row input{flex:1;padding:12px 16px;border:2px solid var(--gray-mid);border-radius:8px;font-size:1rem;font-family:inherit;transition:border-color .2s}
.input-row input:focus{outline:none;border-color:var(--gold)}
.input-row button{padding:12px 28px;background:var(--navy);color:var(--white);border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap}
.input-row button:hover{background:var(--navy-light)}
.hint{font-size:.78rem;color:var(--gray-dark);margin-top:8px}
.quick-list{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px}
.quick-list button{padding:5px 12px;font-size:.78rem;background:var(--gray);border:1px solid var(--gray-mid);border-radius:20px;cursor:pointer;font-family:inherit;transition:all .15s}
.quick-list button:hover{background:var(--gold-light);border-color:var(--gold);color:var(--navy-dark)}
#results{min-height:100px}
.result-card{background:var(--white);border-radius:10px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:16px;border-left:4px solid var(--navy)}
.result-card.no-crematory{border-left-color:var(--red)}
.result-municipality{font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:4px}
.result-status{font-size:.82rem;padding:3px 10px;border-radius:12px;display:inline-block;margin-bottom:14px;font-weight:600}
.result-status.ok{background:#e8f5e9;color:var(--green)}
.result-status.none{background:#fdecea;color:var(--red)}
.result-status.private-status{background:#fff8e1;color:#8d6e00}
.saijo-item{background:var(--gray);border-radius:8px;padding:16px;margin-bottom:10px}
.saijo-item:last-child{margin-bottom:0}
.saijo-name{font-weight:700;font-size:1.05rem;color:var(--navy-dark);margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.saijo-badge{font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.badge-crematory{background:var(--navy);color:var(--white)}
.badge-hall{background:var(--gold);color:var(--white)}
.badge-private{background:#ff9800;color:var(--white)}
.saijo-detail{font-size:.85rem;color:var(--text-light);margin-bottom:3px;padding-left:2px}
.saijo-detail a{color:var(--navy);text-decoration:none}
.saijo-detail a:hover{text-decoration:underline}
.saijo-members{font-size:.8rem;color:var(--gray-dark);margin-top:8px;padding:8px 12px;background:var(--white);border-radius:6px}
.saijo-members strong{color:var(--text)}
.info-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:.84rem}
.info-table th{background:#e8e6e1;color:var(--navy-dark);padding:7px 10px;text-align:left;font-weight:600;width:38%;white-space:nowrap;font-size:.78rem}
.info-table td{padding:7px 10px;border-bottom:1px solid var(--gray-mid);background:var(--white)}
.info-table tr:last-child td{border-bottom:none}
.avail-tag{font-size:.72rem;padding:2px 6px;border-radius:8px;font-weight:600}
.avail-yes{background:#e8f5e9;color:var(--green)}
.avail-no{background:#fdecea;color:var(--red)}
.avail-cond{background:#fff8e1;color:#8d6e00}
.booking-tag{font-size:.72rem;padding:3px 8px;border-radius:8px;font-weight:600;display:inline-block;margin-right:4px}
.booking-web{background:#e3f2fd;color:#1565c0}
.booking-tel{background:#f3e5f5;color:#7b1fa2}
.booking-window{background:#fff3e0;color:#e65100}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.btn-action{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:600;text-decoration:none;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-action:hover{opacity:.85;transform:translateY(-1px)}
.btn-web{background:#1565c0;color:var(--white)}
.btn-tel{background:var(--green);color:var(--white)}
.btn-hp{background:var(--navy);color:var(--white)}
.btn-detail{background:var(--gold);color:var(--white)}
.btn-disabled{background:var(--gray-mid);color:var(--gray-dark);cursor:default;pointer-events:none}
.note-box{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:14px 16px;margin-top:12px;font-size:.82rem;color:#6d5600}
.all-list-section{background:var(--white);border-radius:10px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-top:16px}
.all-list-section h2{font-size:1.1rem;color:var(--navy);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--gray-mid)}
.all-table{width:100%;border-collapse:collapse;font-size:.78rem}
.all-table th{background:var(--navy);color:var(--white);padding:8px 6px;text-align:left;font-weight:600;position:sticky;top:0;white-space:nowrap}
.all-table td{padding:7px 6px;border-bottom:1px solid var(--gray-mid);vertical-align:top}
.all-table tr:hover td{background:#f0efe9}
.tab-bar{display:flex;gap:0;margin-bottom:0;border-bottom:2px solid var(--gray-mid)}
.tab-btn{padding:10px 20px;background:var(--gray);border:none;border-bottom:3px solid transparent;font-size:.88rem;font-family:inherit;cursor:pointer;font-weight:600;color:var(--gray-dark);transition:all .2s;margin-bottom:-2px}
.tab-btn.active{background:var(--white);color:var(--navy);border-bottom-color:var(--gold)}
.tab-btn:hover:not(.active){background:var(--gray-mid)}
.tab-content{display:none}
.tab-content.active{display:block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.stat-number{font-size:1.8rem;font-weight:700;color:var(--navy)}
.stat-label{font-size:.75rem;color:var(--gray-dark);margin-top:2px}
/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;overflow-y:auto;padding:20px;justify-content:center;align-items:flex-start}
.modal-overlay.open{display:flex}
.modal-content{background:var(--white);border-radius:12px;max-width:820px;width:100%;margin:40px auto;padding:0;position:relative;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.modal-header{background:linear-gradient(135deg,var(--navy-dark),var(--navy));color:var(--white);padding:20px 24px;border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:1.15rem;font-weight:700}
.modal-close{background:none;border:none;color:var(--white);font-size:1.6rem;cursor:pointer;padding:0 4px;opacity:.8}
.modal-close:hover{opacity:1}
.modal-body{padding:24px}
.modal-section{margin-bottom:20px}
.modal-section-title{font-size:.9rem;font-weight:700;color:var(--navy);padding:6px 12px;background:var(--gray);border-left:3px solid var(--gold);margin-bottom:8px;border-radius:0 4px 4px 0}
.modal-table{width:100%;border-collapse:collapse;font-size:.84rem;margin-bottom:4px}
.modal-table th{background:#f0efe9;padding:6px 10px;text-align:left;font-weight:600;width:35%;border-bottom:1px solid var(--gray-mid);font-size:.78rem;color:var(--navy-dark)}
.modal-table td{padding:6px 10px;border-bottom:1px solid var(--gray-mid)}
.modal-warnings{margin:4px 0;padding-left:0;list-style:none;font-size:.82rem}
.modal-warnings li{padding:4px 8px;margin-bottom:3px;background:#fff8e1;border-left:3px solid #ff9800;border-radius:0 4px 4px 0;color:#6d5600}
footer{text-align:center;padding:20px;font-size:.75rem;color:var(--gray-dark);border-top:1px solid var(--gray-mid);margin-top:10px}
footer .warn{color:var(--red);font-weight:600}
@media(max-width:600px){
  header h1{font-size:1.2rem}
  .input-row{flex-direction:column}
  .input-row button{padding:14px}
  .search-box{padding:20px 16px}
  .result-card{padding:18px 16px}
  .quick-list button{font-size:.72rem;padding:4px 10px}
  .all-table{font-size:.7rem}
  .all-table th,.all-table td{padding:5px 4px}
  .stats{grid-template-columns:repeat(2,1fr)}
  .btn-row{gap:6px}
  .btn-action{padding:7px 10px;font-size:.74rem}
  .info-table th{width:35%;font-size:.72rem;padding:5px 6px}
  .info-table td{padding:5px 6px;font-size:.78rem}
  .modal-content{margin:10px auto}
  .modal-body{padding:16px}
  .tab-btn{padding:8px 12px;font-size:.78rem}
}
@media print{
  header{background:var(--navy)!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .search-box,.tab-bar,.quick-list,.btn-row{display:none}
  .tab-content{display:block!important}
}
</style>
</head>
<body>
<header>
  <h1>埼玉県 公営斎場検索</h1>
  <p>現住所から市民料金で利用できる公営斎場を検索</p>
</header>
<div class="container">
  <div class="search-box">
    <label>お住まいの市区町村を入力してください</label>
    <div class="input-row">
      <input type="text" id="searchInput" list="municipalityList" placeholder="例：さいたま市、川越市、所沢市..." autocomplete="off">
      <button onclick="doSearch()">検索</button>
    </div>
    <datalist id="municipalityList"></datalist>
    <p class="hint">市区町村名を入力すると候補が表示されます。選択後「検索」を押してください。</p>
    <div class="quick-list" id="quickList"></div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('search')">検索結果</button>
    <button class="tab-btn" onclick="switchTab('alllist')">全斎場一覧</button>
    <button class="tab-btn" onclick="switchTab('allmunicipality')">全市町村一覧</button>
  </div>
  <div id="tab-search" class="tab-content active">
    <div id="results" style="margin-top:16px">
      <div style="text-align:center;padding:40px 20px;color:var(--gray-dark)">上の検索欄に市区町村名を入力して検索してください</div>
    </div>
  </div>
  <div id="tab-alllist" class="tab-content">
    <div class="all-list-section" style="margin-top:16px">
      <h2>埼玉県 公営斎場・火葬場 全一覧</h2>
      <div class="stats" id="stats"></div>
      <div id="allCards"></div>
    </div>
  </div>
  <div id="tab-allmunicipality" class="tab-content">
    <div class="all-list-section" style="margin-top:16px">
      <h2>市町村別 利用可能斎場一覧</h2>
      <div style="overflow-x:auto"><table class="all-table" id="munTable">
        <thead><tr><th>市町村名</th><th>利用可能な公営斎場</th><th>火葬料(税込)</th><th>状況</th></tr></thead>
        <tbody id="munTableBody"></tbody>
      </table></div>
    </div>
  </div>
</div>
<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="detailTitle"></h2>
      <button class="modal-close" onclick="closeDetail()">&times;</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
  </div>
</div>
<footer>
  <p class="warn">※ 本データは各公式サイト・埼玉県公式情報・各斎場提供資料を基に作成していますが、最新の正確な情報は各斎場・各自治体にご確認ください。</p>
  <p style="margin-top:6px">葬儀社実務用 公営斎場検索ツール</p>
</footer>

/* ===== Helper Functions ===== */
function yen(v){if(v===null||v===undefined)return"-";if(v===0)return"無料";return v.toLocaleString()+"円";}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function availTag(v){
  if(v==="yes")return'<span class="avail-tag avail-yes">可</span>';
  if(v==="no")return'<span class="avail-tag avail-no">不可</span>';
  if(v==="cond")return'<span class="avail-tag avail-cond">条件付</span>';
  return'<span style="color:var(--gray-dark);font-size:.75rem">-</span>';
}
function bookingTag(s){
  if(!s)return'<span class="booking-tag" style="background:#eee;color:#999">未確認</span>';
  const tags=[];
  if(s.includes("web"))tags.push('<span class="booking-tag booking-web">WEB予約</span>');
  if(s.includes("tel"))tags.push('<span class="booking-tag booking-tel">電話予約</span>');
  if(s.includes("window"))tags.push('<span class="booking-tag booking-window">窓口予約</span>');
  return tags.join(" ");
}

/* ===== Render Functions ===== */
function renderItem(s){
  let h=`<div class="saijo-item"><div class="saijo-name">${esc(s.name)}`;
  if(s.fac.includes("c")&&s.fac.includes("h"))h+=`<span class="saijo-badge badge-crematory">火葬場</span><span class="saijo-badge badge-hall">式場</span>`;
  else if(s.fac.includes("c"))h+=`<span class="saijo-badge badge-crematory">火葬場</span>`;
  else h+=`<span class="saijo-badge badge-hall">式場のみ</span>`;
  if(s.tp==="private")h+=`<span class="saijo-badge badge-private">民営</span>`;
  h+=`</div>`;
  h+=`<div class="saijo-detail">\u{1F4CD} ${esc(s.addr)} <a href="https://www.google.com/maps/search/${encodeURIComponent(s.addr)}" target="_blank" rel="noopener">[地図]</a></div>`;
  h+=`<div class="saijo-detail">\u{1F3E2} ${esc(s.op)}</div>`;

  /* Info table */
  h+=`<table class="info-table">`;
  h+=`<tr><th>\u{1F4C5} 予約方法</th><td>${bookingTag(s.booking)}</td></tr>`;
  if(s.tel)h+=`<tr><th>\u{260E}\u{FE0F} TEL</th><td><a href="tel:${s.tel}" style="color:var(--navy);font-weight:600">${esc(s.tel)}</a>${s.fax?' <span style="font-size:.75rem;color:var(--gray-dark)">FAX:'+esc(s.fax)+'</span>':''}</td></tr>`;
  if(s.fac.includes("c")){
    h+=`<tr><th>\u{1F525} 火葬料（組合員）</th><td style="font-weight:700;font-size:1rem;color:var(--navy-dark)">${yen(s.fee.m)}</td></tr>`;
    h+=`<tr><th>\u{1F525} 火葬料（組合外）</th><td style="font-weight:600;color:var(--red)">${yen(s.fee.nm)}</td></tr>`;
    h+=`<tr><th>組合外の火葬利用</th><td>${availTag(s.cremNm)}</td></tr>`;
  }
  if(s.fac.includes("h")&&s.halls&&s.halls.length>0){
    const hallStr=s.halls.map(x=>`${esc(x.n)}：${typeof x.s==="number"?x.s+"席":x.s+"席"}`).join("<br>");
    h+=`<tr><th>\u{1F3DB}\u{FE0F} 式場（${s.halls.length}室）</th><td>${hallStr}</td></tr>`;
    if(s.fac.includes("c"))h+=`<tr><th>組合外の式場利用</th><td>${availTag(s.hallNm)}</td></tr>`;
  }
  if(s.mun.length>1)h+=`<tr><th>構成市町村</th><td>${s.mun.map(esc).join("、")}</td></tr>`;
  h+=`</table>`;

  if(s.note)h+=`<div style="margin-top:8px;font-size:.8rem;color:#8d6e00;background:#fff8e1;padding:6px 10px;border-radius:6px">\u{26A0}\u{FE0F} ${esc(s.note)}</div>`;

  /* Action buttons */
  h+=`<div class="btn-row">`;
  if(s.bookingUrl)h+=`<a href="${esc(s.bookingUrl)}" target="_blank" rel="noopener" class="btn-action btn-web">\u{1F310} WEB予約</a>`;
  if(s.tel)h+=`<a href="tel:${s.tel}" class="btn-action btn-tel">\u{1F4DE} 斎場に電話する</a>`;
  if(s.hp)h+=`<a href="${esc(s.hp)}" target="_blank" rel="noopener" class="btn-action btn-hp">\u{1F3E0} 公式ホームページ</a>`;
  if(DETAIL[s.id])h+=`<button class="btn-action btn-detail" onclick="openDetail(${s.id})">\u{1F4CB} 斎場詳細</button>`;
  else h+=`<span class="btn-action btn-disabled">\u{1F4CB} 詳細資料準備中</span>`;
  h+=`</div>`;

  h+=`</div>`;
  return h;
}

/* ===== Detail Modal ===== */
function openDetail(id){
  const d=DETAIL[id];if(!d)return;
  const f=D.find(x=>x.id===id);
  document.getElementById("detailTitle").textContent=f.name+" 詳細資料";
  let h="";
  d.sections.forEach(sec=>{
    h+=`<div class="modal-section"><div class="modal-section-title">${esc(sec.t)}</div>`;
    if(sec.r){
      h+=`<table class="modal-table">`;
      sec.r.forEach(row=>{h+=`<tr><th>${esc(row[0])}</th><td>${esc(row[1])}</td></tr>`;});
      h+=`</table>`;
    }
    if(sec.w){
      h+=`<ul class="modal-warnings">`;
      sec.w.forEach(item=>{h+=`<li>\u{26A0}\u{FE0F} ${esc(item)}</li>`;});
      h+=`</ul>`;
    }
    h+=`</div>`;
  });
  /* Add action buttons in modal too */
  h+=`<div class="btn-row" style="margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-mid)">`;
  if(f.bookingUrl)h+=`<a href="${esc(f.bookingUrl)}" target="_blank" rel="noopener" class="btn-action btn-web">\u{1F310} WEB予約</a>`;
  if(f.tel)h+=`<a href="tel:${f.tel}" class="btn-action btn-tel">\u{1F4DE} 斎場に電話する</a>`;
  if(f.hp)h+=`<a href="${esc(f.hp)}" target="_blank" rel="noopener" class="btn-action btn-hp">\u{1F3E0} 公式ホームページ</a>`;
  h+=`</div>`;
  document.getElementById("detailBody").innerHTML=h;
  document.getElementById("detailModal").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeDetail(){
  document.getElementById("detailModal").classList.remove("open");
  document.body.style.overflow="";
}

/* ===== Core Functions ===== */
function init(){
  const dl=document.getElementById("municipalityList");
  MUNS.forEach(m=>{const o=document.createElement("option");o.value=m;dl.appendChild(o);});
  const ql=document.getElementById("quickList");
  ["さいたま市","川口市","川越市","所沢市","越谷市","春日部市","草加市","熊谷市","朝霞市","戸田市","入間市","狭山市","上尾市","新座市","三郷市","富士見市"].forEach(m=>{
    const b=document.createElement("button");b.textContent=m;
    b.onclick=()=>{document.getElementById("searchInput").value=m;doSearch();};ql.appendChild(b);
  });
  buildAll();buildMun();buildStats();
  document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
}

function doSearch(){
  const input=document.getElementById("searchInput").value.trim();
  const res=document.getElementById("results");
  switchTab("search");
  if(!input){res.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--gray-dark)">市区町村名を入力してください</div>';return;}
  const mun=MUNS.find(m=>m===input||input.includes(m)||m.includes(input));
  if(!mun){res.innerHTML=`<div class="result-card no-crematory"><div class="result-municipality">${esc(input)}</div><p style="color:var(--red)">該当する市区町村が見つかりません。埼玉県内の市区町村名を正確に入力してください。</p></div>`;return;}
  const matched=D.filter(s=>s.mun.includes(mun));
  const crems=matched.filter(s=>s.fac.includes("c"));
  const halls=matched.filter(s=>s.fac.includes("h")&&!s.fac.includes("c"));
  const noInfo=NO_CREM[mun];
  let h="";
  h+=`<div class="result-card${crems.length===0&&noInfo?" no-crematory":""}">`;
  h+=`<div class="result-municipality">${esc(mun)} の方</div>`;
  if(crems.length>0){
    const pub=crems.some(s=>s.tp==="public");
    if(pub)h+=`<span class="result-status ok">市民料金で利用可能な公営火葬場あり</span>`;
    else h+=`<span class="result-status private-status">民営火葬場（市民料金区分あり）</span>`;
  }else{h+=`<span class="result-status none">管轄の公営火葬場なし</span>`;}
  if(crems.length>0){h+=`<h3 style="font-size:.9rem;color:var(--navy);margin:14px 0 10px;font-weight:700">\u{1F525} 利用可能な火葬場</h3>`;crems.forEach(s=>{h+=renderItem(s);});}
  if(halls.length>0){h+=`<h3 style="font-size:.9rem;color:var(--navy);margin:14px 0 10px;font-weight:700">\u{1F3DB}\u{FE0F} 利用可能な公営式場（火葬場なし）</h3>`;halls.forEach(s=>{h+=renderItem(s);});}
  if(noInfo)h+=`<div class="note-box"><strong>備考：</strong>${esc(noInfo)}</div>`;
  h+=`</div>`;res.innerHTML=h;
}

function buildAll(){
  const el=document.getElementById("allCards");
  const crems=D.filter(s=>s.fac.includes("c"));
  const honly=D.filter(s=>!s.fac.includes("c"));
  let h=`<h3 style="font-size:.95rem;color:var(--navy);margin:10px 0 12px;padding:8px 12px;background:var(--gray);border-radius:6px">\u{1F525} 火葬場・斎場（${crems.length}施設）</h3>`;
  crems.forEach(s=>{h+=renderItem(s);});
  h+=`<h3 style="font-size:.95rem;color:var(--navy);margin:20px 0 12px;padding:8px 12px;background:var(--gray);border-radius:6px">\u{1F3DB}\u{FE0F} 式場のみ（${honly.length}施設）</h3>`;
  honly.forEach(s=>{h+=renderItem(s);});
  el.innerHTML=h;
}

function buildMun(){
  const tb=document.getElementById("munTableBody");
  let h="";
  MUNS.forEach(m=>{
    const matched=D.filter(s=>s.mun.includes(m)&&s.fac.includes("c"));
    const halls=D.filter(s=>s.mun.includes(m)&&!s.fac.includes("c"));
    const noInfo=NO_CREM[m];
    let names=matched.map(s=>{let l=s.name;if(s.tp==="private")l+="(民営)";return l;});
    if(halls.length>0)names=names.concat(halls.map(s=>s.name+"(式場のみ)"));
    const feeStr=matched.length>0?matched.map(s=>yen(s.fee.m)).join(" / "):"-";
    let status="";
    if(matched.length>0&&matched.some(s=>s.tp==="public"))status='<span style="color:var(--green);font-weight:600">\u{25CE}</span>';
    else if(matched.length>0)status='<span style="color:#8d6e00;font-weight:600">\u{25B3}</span>';
    else status='<span style="color:var(--red);font-weight:600">\u{2715}</span>';
    h+=`<tr>
      <td style="cursor:pointer;color:var(--navy);font-weight:600;white-space:nowrap" onclick="document.getElementById('searchInput').value='${m}';doSearch();">${esc(m)}</td>
      <td>${names.length>0?names.map(esc).join("、"):(noInfo?'<span style="font-size:.72rem;color:var(--gray-dark)">'+esc(noInfo).substring(0,30)+'\u{2026}</span>':"-")}</td>
      <td style="white-space:nowrap">${feeStr}</td>
      <td>${status}</td>
    </tr>`;
  });
  tb.innerHTML=h;
}

function buildStats(){
  const cc=D.filter(s=>s.fac.includes("c")&&s.tp==="public").length;
  const pc=D.filter(s=>s.tp==="private").length;
  const hc=D.filter(s=>!s.fac.includes("c")).length;
  const cm=new Set();D.filter(s=>s.fac.includes("c")).forEach(s=>s.mun.forEach(m=>cm.add(m)));
  document.getElementById("stats").innerHTML=`
    <div class="stat-card"><div class="stat-number">${cc}</div><div class="stat-label">公営火葬場</div></div>
    <div class="stat-card"><div class="stat-number">${pc}</div><div class="stat-label">民営火葬場</div></div>
    <div class="stat-card"><div class="stat-number">${hc}</div><div class="stat-label">式場のみ</div></div>
    <div class="stat-card"><div class="stat-number">${cm.size}<span style="font-size:.9rem;font-weight:400">/${MUNS.length}</span></div><div class="stat-label">市町村カバー</div></div>`;
}

function switchTab(t){
  document.querySelectorAll(".tab-btn").forEach((b,i)=>{
    b.classList.toggle("active",["search","alllist","allmunicipality"][i]===t);
  });
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));
  document.getElementById("tab-"+t).classList.add("active");
}

init();
</script>
</body>
</html>
